services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
    restart: always
    networks:
      - web_network # Une el servicio a la red del proxy

networks:
  web_network:
    external: true # Indica que la red ya existe y no debe crearla de nuevo
