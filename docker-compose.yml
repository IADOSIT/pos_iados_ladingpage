version: '3.8'

services:
  landing-page-pos:
    build: .
    container_name: pos-landing-page
    ports:
      - "8086:80"
    # volumes:
    #   - .:/usr/share/nginx/html
    restart: always
    networks:
      - web_network # Une el servicio a la red del proxy

networks:
  web_network:
    external: true # Indica que la red ya existe y no debe crearla de nuevo
